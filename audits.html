<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GridFleet | DeFi Audits | Under construction</title>
<meta name="description" content="GridFleet is the multi-agent execution layer used by operators who need AI that coordinates, acts, and produces receipts. Site under construction; back soon." />
<meta property="og:title" content="GridFleet | DeFi Audits | Under construction" />
<meta property="og:description" content="GridFleet, the multi-agent execution layer. Site under construction." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://gridfleet.ai/audits" />
<meta property="og:image" content="https://gridfleet.ai/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://gridfleet.ai/og.png" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://gridfleet.ai/audits" />

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0a0a0a;
    color: #ededee;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    letter-spacing: -0.011em;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 70% 60% at 70% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
  }
  main{
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .wrap{
    text-align: center;
    max-width: 560px;
  }
  .brand{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 56px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #a1a1aa;
  }
  .brand .mark{
    width: 18px;
    height: 18px;
    background: conic-gradient(from 90deg at 50% 50%, #fff 0deg, #fff 90deg, transparent 90deg, transparent 180deg, #fff 180deg, #fff 270deg, transparent 270deg);
    border-radius: 3px;
    opacity: 0.85;
  }
  h1{
    font-weight: 200;
    font-size: clamp(40px, 6vw, 72px);
    line-height: 1.05;
    letter-spacing: -0.035em;
    margin: 0 0 24px;
    color: #fff;
  }
  h1 .accent{
    font-style: italic;
    font-weight: 300;
    background: linear-gradient(120deg, #a5b4fc 0%, #c4b5fd 60%, #67e8f9 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p{
    color: #a1a1aa;
    font-size: 17px;
    margin: 0 0 12px;
  }
  .meta{
    margin-top: 40px;
    font-size: 13px;
    color: #71717a;
    letter-spacing: 0.04em;
  }
  .meta a{
    color: #a1a1aa;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    transition: color 0.2s;
  }
  .meta a:hover{
    color: #fff;
    border-bottom-color: rgba(255,255,255,0.5);
  }
  .pulse{
    display: inline-block;
    width: 8px;
    height: 8px;
    margin-right: 8px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.65);
    vertical-align: middle;
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }
  @media (prefers-reduced-motion: reduce){
    .pulse{ animation: none; }
  }
</style>
</head>
<body>
<main>
  <div class="wrap">
    <div class="brand"><span class="mark"></span><span>GRIDFLEET</span></div>
    <h1>Under <span class="accent">construction.</span></h1>
    <p>We are rebuilding. Come back soon.</p>
    <div class="meta">
      <span class="pulse"></span>Fleet still operational &middot; for inquiries, <a href="mailto:hello@gridfleet.ai">hello@gridfleet.ai</a>
    </div>
  </div>
</main>
</body>
</html>
